name: 自动编译 OpenWrt 固件 (NanoPi R4S 1G docker版)

# 设计目标：
#   - 始终跟踪 openwrt/openwrt 的 openwrt-25.12 分支最新代码（包含未来的 25.12.5 / 25.12.6 ... 点版本更新）
#   - 在官方源码基础上，叠加 NanoPi R4S 1GB(DDR3) 内存训练支持补丁
#     补丁来源：anaelorlinski/OpenWrt-NanoPi-R2S-R4S-Builds 仓库 openwrt-25.12/patches 目录
#     （核心是 FriendlyARM 官方工程师 Jensen Huang 提交的 U-Boot 补丁，让同一个 TPL
#       通过读取板载硬件版本 ADC 引脚，自动判断该用 DDR3 还是 LPDDR4 训练参数）
#   - 每天定时检查官方分支是否有新提交，有更新才真正编译，没更新就跳过节省时间
#   - 编译产物以 GitHub Release 形式发布，文件名/tag 带上源码 commit 短哈希方便追溯
#
# 本版本运行在自托管 WSL2 (Ubuntu) runner 上，跑在你自己的 Windows 电脑里。
# 跟 GitHub 云端机器版本的主要区别：
#   - 磁盘是持久的，所以用 git fetch+reset 增量更新源码，而不是每次重新完整克隆
#   - 不需要 actions/cache（本来就在本地磁盘上，缓存反而要多一趟网络上传下载）
#   - 不需要"释放磁盘空间"那一步（GH云端机器专用的应急操作，自己电脑磁盘按需自己规划）
#   - runs-on 改成你注册 runner 时设置的标签
#
# 本次更新（软件空间1G + 插件齐套）：
#   - 显式设置 rootfs 分区 1024M（"软件空间1G"）。⚠️ 注意：dockerman(含Docker引擎) +
#     passwall(v2ray/xray/sing-box核心) + homeproxy(sing-box) + diskman 这几个叠在一起，
#     压缩包大小预估会摸到 700-900M，1024M 分区扣掉系统本身后实际可用空间会比较紧张，
#     日志、容器运行时层、未来 apk 升级都要占空间。已加了编译后的占用检查步骤提醒你；
#     如果刷机后发现空间不够，把下面 CONFIG_TARGET_ROOTFS_PARTSIZE 调到 1536 或更大即可。
#   - 新增 luci-app-dockerman / luci-app-diskman / luci-app-passwall / luci-app-homeproxy /
#     luci-app-upnp，并把每个插件的完整依赖都显式列出（不依赖 Makefile 自动带，更可控）。
#   - dnsmasq 换成 dnsmasq-full：passwall/homeproxy 的域名分流(ipset/nftset)功能依赖
#     dnsmasq-full 才有的能力，原版精简版 dnsmasq 没有这部分功能，两者不能同时选中
#     （会因为安装时争抢同一批文件路径而冲突），所以这里是替换不是新增。
#   - IPv6: odhcp6c/odhcpd-ipv6only 原配置已有(DHCPv6客户端+服务端/前缀分发)，这里
#     额外加上 kmod-ipv6 显式选中；IPv6 转发本身在 OpenWrt 默认 LAN/WAN 防火墙区域
#     配置里就是默认允许转发的（不像 NAT 那样需要单独配置），不需要额外的包，
#     只要保证 WAN 口正确获取到 IPv6 PD 前缀、LAN 口开启 RA，转发就会自动工作。
#   - 额外顺手加了 zram-swap：1GB内存跑 docker+多个代理核心，运行时内存压力不小，
#     zram 压缩内存做 swap 比直接用磁盘 swap 性能好很多，是这类低内存路由器的常见标配。
#     如果你不需要可以删掉这两行。

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 18 * * *'   # 每天 UTC 18:00（北京时间次日凌晨2点）检查一次

permissions:
  contents: write

jobs:
  check-update:
    runs-on: ubuntu-22.04   # 这一步很轻量，继续用GitHub免费云端机器即可，不占用你自己电脑
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      openwrt_sha: ${{ steps.check.outputs.openwrt_sha }}
      openwrt_short: ${{ steps.check.outputs.openwrt_short }}
    steps:
      - name: 获取官方 openwrt-25.12 分支最新 commit
        id: check
        run: |
          set -e
          SHA=$(git ls-remote https://github.com/openwrt/openwrt.git refs/heads/openwrt-25.12 | cut -f1)
          SHORT=${SHA:0:7}
          echo "最新 commit: $SHA"
          # 检查本仓库是否已经发布过这个版本对应的 release
          EXISTS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/r4s-1g-${SHORT}")
          if [ "$EXISTS" = "200" ]; then
            echo "该版本($SHORT)已经编译发布过，跳过本次编译"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "发现新版本($SHORT)，将开始编译"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi
          echo "openwrt_sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "openwrt_short=$SHORT" >> "$GITHUB_OUTPUT"

  build:
    needs: check-update
    if: needs.check-update.outputs.should_build == 'true'
    runs-on: ubuntu-22.04   # 改成你注册 runner 时实际打的标签
    timeout-minutes: 300
    steps:
      - name: 安装编译依赖（已装过的会自动跳过，很快）
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
            gettext git java-propose-classpath libelf-dev libncurses5-dev \
            libncursesw5-dev libssl-dev python3 python3-dev python3-distutils \
            python3-setuptools python3-pyelftools qemu-utils rsync subversion \
            swig unzip zlib1g-dev zstd xsltproc wget jq curl \
            flex bison bc bzip2 diffutils findutils

      - name: 拉取/更新官方 OpenWrt 源码 (openwrt-25.12 分支，增量更新)
        run: |
          set -e
          if [ -d openwrt/.git ]; then
            echo "已存在本地仓库，增量更新..."
            cd openwrt
            git fetch --depth 1 origin openwrt-25.12
            git reset --hard origin/openwrt-25.12
            git clean -fd   # 只清理误留的杂散文件，不动 dl/ build_dir/ 等被.gitignore的缓存目录
          else
            echo "首次运行，完整克隆（只有这一次会比较慢）..."
            git clone --depth 1 --branch openwrt-25.12 \
              https://github.com/openwrt/openwrt.git openwrt
            cd openwrt
          fi
          git log -1

      - name: 拉取/更新 R4S 1G 修复补丁集
        run: |
          set -e
          if [ -d patch-src/.git ]; then
            cd patch-src && git fetch --depth 1 origin && git reset --hard origin/HEAD
          else
            git clone --depth 1 \
              https://github.com/anaelorlinski/OpenWrt-NanoPi-R2S-R4S-Builds.git patch-src
          fi

      - name: 应用补丁（U-Boot 多内存类型支持 + R4S 已知问题修复）
        run: |
          set -e
          cd openwrt
          PATCHES=../patch-src/openwrt-25.12/patches

          # 1) 完整替换 uboot-rockchip 包：在官方包基础上叠加 R4S 1G(DDR3)/4G(LPDDR4)
          #    自动识别补丁（309/310），以及一系列既有修复（301-308, 003-005）。
          #    这部分都是 rk3399/通用构建修复，跟 R4S 直接相关，全量保留。
          rm -rf package/boot/uboot-rockchip
          cp -R "$PATCHES/package/uboot-rockchip" package/boot/

          # 2) 内核补丁：只挑跟 R4S(rk3399) 或通用 rockchip 相关的几个，
          #    不引入 R2S(rk3328) 专用补丁 —— 这些补丁会改动其他无关板子的
          #    .dts 文件，一旦上游那些文件发生变动就可能 hunk 对不上而报错。
          KDIR=$(find target/linux/rockchip -maxdepth 1 -type d -name "patches-*" | head -n1)
          echo "内核补丁目录: $KDIR"
          for p in 103-arm64-dts-rockchip-lower-mmc-speed.patch \
                   402-1-rk3399-fix-pci-phy-reset-on-probe.patch \
                   501-mmc-core-set-initial-signal-voltage-on-power-off.patch; do
            SRC="$PATCHES/target/linux/rockchip/$(basename "$KDIR")/$p"
            if [ -f "$SRC" ]; then
              cp "$SRC" "$KDIR/"
              echo "已加入: $p"
            else
              echo "警告：没找到 $p（可能补丁集目录结构变了，跳过）"
            fi
          done

          # 注意：不再触碰 target/linux/rockchip/image/armv8.mk（原因见历史记录：
          # 补丁源仓库这个文件只是想换网卡驱动，跟1G启动问题无关，但整文件覆盖
          # 容易带进其他无关设备已经过时的内容，保留官方原版最稳妥）。

          echo "补丁应用完成，列出关键文件确认："
          ls package/boot/uboot-rockchip/patches/ | grep -E "30[0-9]|31[0]"
          ls "$KDIR" | grep -E "103-|402-1|501-"

      - name: 更新并安装 feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 生成针对 NanoPi R4S 的编译配置
        working-directory: openwrt
        run: |
          cat > .config << 'EOF'
          CONFIG_TARGET_rockchip=y
          CONFIG_TARGET_rockchip_armv8=y
          CONFIG_TARGET_rockchip_armv8_DEVICE_friendlyarm_nanopi-r4s=y

          # ── 分区大小：软件空间设为 1G ──
          CONFIG_TARGET_KERNEL_PARTSIZE=32
          CONFIG_TARGET_ROOTFS_PARTSIZE=1024

          # ── 基础系统包 ──
          CONFIG_PACKAGE_apk-mbedtls=y
          CONFIG_PACKAGE_base-files=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_ca-certificates=y
          CONFIG_PACKAGE_dropbear=y
          CONFIG_PACKAGE_e2fsprogs=y
          CONFIG_PACKAGE_firewall4=y
          CONFIG_PACKAGE_fstools=y
          CONFIG_PACKAGE_kmod-gpio-button-hotplug=y
          CONFIG_PACKAGE_kmod-nft-offload=y
          CONFIG_PACKAGE_libc=y
          CONFIG_PACKAGE_libgcc=y
          CONFIG_PACKAGE_libustream-mbedtls=y
          CONFIG_PACKAGE_logd=y
          CONFIG_PACKAGE_mkf2fs=y
          CONFIG_PACKAGE_mtd=y
          CONFIG_PACKAGE_netifd=y
          CONFIG_PACKAGE_nftables=y
          CONFIG_PACKAGE_partx-utils=y
          CONFIG_PACKAGE_ppp=y
          CONFIG_PACKAGE_ppp-mod-pppoe=y
          CONFIG_PACKAGE_procd-ujail=y
          CONFIG_PACKAGE_uboot-envtools=y
          CONFIG_PACKAGE_uci=y
          CONFIG_PACKAGE_uclient-fetch=y
          CONFIG_PACKAGE_urandom-seed=y
          CONFIG_PACKAGE_urngd=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y
          CONFIG_PACKAGE_luci-app-attendedsysupgrade=y

          # ── 网卡驱动：R4S 两个千兆口芯片不同，缺一个会少一个网口 ──
          # 片内GMAC -> kmod-r8169(配合PHY)；USB3.0转千兆口实际是Realtek RTL8153芯片
          CONFIG_PACKAGE_kmod-r8169=y
          CONFIG_PACKAGE_kmod-usb-net-rtl8152=y

          # ── IPv6 支持与转发 ──
          # odhcp6c: DHCPv6客户端(WAN侧获取IPv6地址/PD前缀)
          # odhcpd-ipv6only: DHCPv6服务端+RA(LAN侧给设备分配IPv6/下发前缀)
          # kmod-ipv6: 内核IPv6协议栈模块
          # IPv6转发本身不需要单独的包，OpenWrt默认防火墙区域配置(lan/wan zone forward)
          # 默认就允许转发，只要上面两个DHCPv6包配置好WAN取前缀、LAN做RA即可生效
          CONFIG_PACKAGE_odhcp6c=y
          CONFIG_PACKAGE_odhcpd-ipv6only=y
          CONFIG_PACKAGE_kmod-ipv6=y

          # ── dnsmasq-full：替换精简版dnsmasq ──
          # passwall/homeproxy的域名分流(ipset/nftset)依赖dnsmasq-full才有的能力，
          # 不能和精简版dnsmasq同时选中(会冲突)，这里是替换关系
          CONFIG_PACKAGE_dnsmasq-full=y

          # ── luci-app-dockerman 完整依赖 ──
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_luci-i18n-dockerman-zh-cn=y
          CONFIG_PACKAGE_dockerd=y
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_containerd=y
          CONFIG_PACKAGE_runc=y
          CONFIG_PACKAGE_kmod-overlay=y
          CONFIG_PACKAGE_kmod-veth=y
          CONFIG_PACKAGE_kmod-vxlan=y
          CONFIG_PACKAGE_kmod-macvlan=y
          CONFIG_PACKAGE_kmod-ipvlan=y
          CONFIG_PACKAGE_ip-full=y

          # ── luci-app-diskman 完整依赖 ──
          # kmod-fs-msdos / kmod-nls-cp932/936/950: 官方rockchip/armv8预编译仓库不提供，
          # 这4个属于已知问题，源码编译显式选中即可正常编出，参考之前排查记录
          CONFIG_PACKAGE_luci-app-diskman=y
          CONFIG_PACKAGE_luci-i18n-diskman-zh-cn=y
          CONFIG_PACKAGE_blkid=y
          CONFIG_PACKAGE_lsblk=y
          CONFIG_PACKAGE_parted=y
          CONFIG_PACKAGE_dosfstools=y
          CONFIG_PACKAGE_exfat-fsck=y
          CONFIG_PACKAGE_exfat-mkfs=y
          CONFIG_PACKAGE_smartmontools=y
          CONFIG_PACKAGE_btrfs-progs=y
          CONFIG_PACKAGE_kmod-fs-exfat=y
          CONFIG_PACKAGE_kmod-fs-ntfs3=y
          CONFIG_PACKAGE_kmod-fs-msdos=y
          CONFIG_PACKAGE_kmod-nls-cp932=y
          CONFIG_PACKAGE_kmod-nls-cp936=y
          CONFIG_PACKAGE_kmod-nls-cp950=y

          # ── luci-app-passwall 完整依赖 ──
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y
          CONFIG_PACKAGE_kmod-nft-tproxy=y
          CONFIG_PACKAGE_kmod-tun=y
          CONFIG_PACKAGE_resolveip=y
          CONFIG_PACKAGE_ipset=y
          CONFIG_PACKAGE_chinadns-ng=y

          # ── luci-app-homeproxy 完整依赖 ──
          CONFIG_PACKAGE_luci-app-homeproxy=y
          CONFIG_PACKAGE_luci-i18n-homeproxy-zh-cn=y
          CONFIG_PACKAGE_sing-box=y

          # ── luci-app-upnp 完整依赖 ──
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_miniupnpd=y
          CONFIG_PACKAGE_kmod-ipt-conntrack=y

          # ── zram-swap：1GB内存跑docker+多个代理核心，加点缓冲 ──
          CONFIG_PACKAGE_zram-swap=y
          CONFIG_PACKAGE_kmod-zram=y
          EOF
          make defconfig
          echo "===== 确认设备已选中 ====="
          grep "friendlyarm_nanopi-r4s" .config
          echo "===== 确认分区大小 ====="
          grep -E "CONFIG_TARGET_(KERNEL|ROOTFS)_PARTSIZE" .config
          echo "===== 确认五大插件已选中 ====="
          grep -E "CONFIG_PACKAGE_luci-app-(dockerman|diskman|passwall|homeproxy|upnp)=y" .config
          echo "===== 确认网卡驱动 ====="
          grep -E "CONFIG_PACKAGE_kmod-(r8169|usb-net-rtl8152)=y" .config
          echo "===== 确认 dnsmasq-full 替换成功(不应再有精简版dnsmasq) ====="
          grep -E "CONFIG_PACKAGE_dnsmasq" .config

      - name: 下载源码包
        working-directory: openwrt
        run: |
          make download -j8
          find dl -size -1024c -exec echo "警告：下载不完整 {}" \; -exec rm -f {} \;

      - name: 开始编译固件（耗时较长，请耐心等待；本机持久缓存，第二次起会快很多）
        working-directory: openwrt
        run: |
          make -j$(nproc) || make -j1 V=s

      - name: 检查 rootfs 占用情况（1G分区比较紧，编译完后留意一下）
        working-directory: openwrt
        run: |
          OUT_DIR=$(find bin/targets/rockchip -type d -iname armv8 | head -n1)
          IMG=$(find "$OUT_DIR" -name "*-squashfs-sysupgrade*" | head -n1)
          if [ -n "$IMG" ]; then
            SIZE_MB=$(du -m "$IMG" | cut -f1)
            echo "固件压缩包大小：${SIZE_MB}M（rootfs分区上限1024M）"
            if [ "$SIZE_MB" -gt 800 ]; then
              echo "::warning::固件已超过 800M，加上日志/容器层/未来升级占用，1024M分区可能会比较紧张，建议考虑把 CONFIG_TARGET_ROOTFS_PARTSIZE 调到 1536"
            fi
          fi

      - name: 查找生成的固件文件
        id: artifacts
        working-directory: openwrt
        run: |
          set -e
          OUT_DIR=$(find bin/targets/rockchip -type d -iname armv8 | head -n1)
          echo "输出目录: $OUT_DIR"
          ls -la "$OUT_DIR"
          mkdir -p ../release
          cp "$OUT_DIR"/*nanopi-r4s*sysupgrade* ../release/ 2>/dev/null || true
          cp "$OUT_DIR"/*.manifest ../release/ 2>/dev/null || true
          ls -la ../release

      - name: 发布到 GitHub Release
        uses: ncipollo/release-action@v1.14.0
        with:
          tag: r4s-1g-${{ needs.check-update.outputs.openwrt_short }}
          name: "NanoPi R4S 1G 固件 - OpenWrt openwrt-25.12 @ ${{ needs.check-update.outputs.openwrt_short }}"
          body: |
            基于官方 openwrt/openwrt 仓库 `openwrt-25.12` 分支（commit `${{ needs.check-update.outputs.openwrt_sha }}`）自动编译。

            已叠加 NanoPi R4S 1GB(DDR3) 内存训练支持补丁，4GB(LPDDR4) 版本同样可以使用本固件
            （U-Boot 会在启动时自动检测硬件版本并选择对应的内存训练参数）。

            ## 📦 集成插件
            - 🐳 luci-app-dockerman（含 Docker 引擎）
            - 💾 luci-app-diskman（磁盘/分区管理）
            - 🛡️ luci-app-passwall
            - 🚀 luci-app-homeproxy
            - 🔌 luci-app-upnp

            ## ⚙️ 其他
            - 软件空间(rootfs)：1024M
            - IPv6 DHCPv6 + 转发支持
            - zram-swap（应对1GB内存跑多插件的内存压力）

            补丁来源: https://github.com/anaelorlinski/OpenWrt-NanoPi-R2S-R4S-Builds

            ⚠️ 非官方编译，请自行评估风险后使用；首次刷机前建议备份好原固件。
          artifacts: release/*
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
